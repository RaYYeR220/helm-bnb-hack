              - heading "Two tracks. One prize pool. Pick one." [level=1] [ref=e234]:
                - strong [ref=e235]: Two tracks. One prize pool. Pick one.
              - heading "🤖 Track 1. Autonomous Trading Agents ($24,000, 5 winners)" [level=3] [ref=e236]:
                - strong [ref=e237]: 🤖 Track 1. Autonomous Trading Agents ($24,000, 5 winners)
              - paragraph [ref=e238]:
                - emphasis [ref=e239]: Powered by CMC + Trust Wallet + BNB AI Agent SDK
              - paragraph [ref=e240]: Build an agent that reads markets and acts on them (natural-language strategy in, on-chain execution out). Your agent reads markets via CMC, decides, and signs and processes its own transactions via TWAK, all within the rules you set. Then it trades live on BSC during the competition week, and we score it on real PnL (with a few tweaks, see below).
              - paragraph [ref=e241]:
                - strong [ref=e242]: Example builds
                - text: ":"
              - list [ref=e243]:
                - listitem [ref=e244]: An agent that combines CMC funding rates and Fear & Greed with TWAK auto-execution to rotate between BSC perps
                - listitem [ref=e245]: A "DCA agent with a personality" that is sentiment-aware, talks back, and signs its own txs
                - listitem [ref=e246]: A copy-trader that mirrors top wallets through your own risk filters
              - heading "📊 Track 2. Strategy Skills ($6,000, 3 winners)" [level=3] [ref=e247]:
                - strong [ref=e248]: 📊 Track 2. Strategy Skills ($6,000, 3 winners)
              - paragraph [ref=e249]:
                - emphasis [ref=e250]: Powered by CMC
              - paragraph [ref=e251]: Lower entry bar, no execution layer required. Build a CMC Skill that turns market data into a trading strategy. Your deliverable is a backtestable strategy spec, not a live-trading agent. Think Quantopian-style strategy generation, adapted to crypto and authored as an LLM Skill.
              - paragraph [ref=e252]:
                - strong [ref=e253]: Example builds
                - text: ":"
              - list [ref=e254]:
                - listitem [ref=e255]: A momentum Skill that blends RSI, MACD, and Fear & Greed into entry and exit rules
                - listitem [ref=e256]: A sentiment-divergence Skill that flags when social heat and on-chain flow disagree
                - listitem [ref=e257]: A regime-detection Skill that switches strategy based on derivatives positioning
