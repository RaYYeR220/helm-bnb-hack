                - listitem [ref=e223]:
                  - text: 🔐
                  - strong [ref=e224]: "Trust Wallet Agent Kit (TWAK):"
                  - text: self-custody local signing across 30+ chains, with MCP / REST / CLI / LangChain coverage and native x402 support.
                - listitem [ref=e225]:
                  - text: 🛠️
                  - strong [ref=e226]: "BNB AI Agent SDK:"
                  - text: the fastest path from idea to a working agent on BSC.
                - listitem [ref=e227]:
                  - text: 🌐
                  - strong [ref=e228]: "BNB Chain:"
                  - text: fast blocks, cheap gas, and the ecosystem moving fastest on agents right now.
