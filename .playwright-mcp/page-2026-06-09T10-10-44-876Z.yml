              - paragraph [ref=e261]: Three cross-track bonuses, $2,000 each. You can win a main placement and a special.
              - heading "Best Use of Trust Wallet Agent Kit (Track 1)" [level=3] [ref=e262]:
                - strong [ref=e263]: Best Use of Trust Wallet Agent Kit
                - text: (Track 1)
              - paragraph [ref=e264]: For the agent that pushes TWAK the furthest. Self-custody signing, autonomous-mode execution, and native x402 used as the heart of a genuinely hands-off trader, not just plumbing bolted onto an LLM.
              - paragraph [ref=e265]:
                - strong [ref=e266]: Judging Criteria for this track
              - paragraph [ref=e267]:
                - strong [ref=e268]: What wins it.
                - text: For the agent that pushes TWAK the furthest. Self-custody signing, autonomous-mode execution, and native x402 used as the heart of a genuinely hands-off trader, not plumbing bolted onto an LLM.
              - paragraph [ref=e269]:
                - strong [ref=e270]: How it's scored.
                - text: "Like all special prizes, this is decided by the discretionary panel against the four criteria (technical execution, originality, real-world relevance, demo). We weight them as follows for this award:"
              - paragraph [ref=e271]:
                - strong [ref=e272]: Best Use of Trust Wallet Agent Kit, scoring breakdown
              - list [ref=e273]:
                - listitem [ref=e274]: "TWAK integration depth (30): TWAK is the sole execution layer, and the agent leans on more than one surface (signing, autonomous mode, x402), not a single swap call with the real logic living elsewhere."
                - listitem [ref=e275]: "Self-custody integrity (25): keys and signing authority stay with the user the whole way, and local signing runs through the entire trade loop. Penalty applies (see below)."
                - listitem [ref=e276]: "Autonomous execution and guardrails (20): the agent signs and processes its own transactions, genuinely hands-off, inside rules you set (drawdown caps, token allowlists, per-trade and daily limits, slippage protection)."
                - listitem [ref=e277]: "Native x402 usage (10): the agent uses x402 to pay per request for data, inference, or tools as part of its trade loop. Real, not a README mention."
                - listitem [ref=e278]: "Originality and real-world relevance (10): a new take on an agent a self-custody user would actually let run unattended, with a clear user and a plausible path to adoption."
                - listitem [ref=e279]: "Demo and presentation (5): the demo clearly shows the self-custody and autonomous-signing loop end to end, backed by on-chain proof (contract address or tx hash on BSC)."
              - paragraph [ref=e280]:
                - strong [ref=e281]: Self-custody penalty ladder.
                - text: "The 25 points for self-custody scale with how cleanly custody is preserved, this is not a hard disqualifier:"
              - list [ref=e282]:
                - listitem [ref=e283]: Fully self-custodial, clean local signing → 20–25.
                - listitem [ref=e284]: A custodial component in part of the flow (third-party co-signing or custody at one step) → 8–15, depending on how central it is.
                - listitem [ref=e285]: Core trade loop depends on custody → 0–7, flagged in the panel's notes.
              - paragraph [ref=e286]:
                - strong [ref=e287]: Tie-breaker.
                - text: "In order: cleanest self-custody integrity → deepest, least-replaceable TWAK integration → most substantive x402 usage."
